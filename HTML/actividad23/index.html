<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>actividad 21</title>
</head>
<body>
    <header>PRIMER EJERCICIO DE JS</header>
    <button id="button">grande</button>
    <button id="boton">pequeño</button>
    <main>
        <div id="div">
            <p>¿Este Texto cambia?</p>
        </div>
    </main>
    <script>
        const button = document.querySelector("button");
        button.addEventListener("click", function() {
            let titol = document.getElementById("div");
            titol.textContent = "Este texto este en español";
        });

        const botonColor = document.getElementById("boton")
        botonColor.addEventListener("mouseover", function() {
            let color = document.getElementById("boton")
            document.body.style.backgroundColor = "red"
            
        });

        const boton = document.getElementById("boton")
        boton.addEventListener("click", function() {
            let titol = document.getElementById("div");
            titol.textContent = "this text are in english";
        });
    </script>
</body>

</html>
