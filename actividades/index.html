<body>
    <h1>Patatas Fritas</h1>
    <p>patatas fritas caseras</p>
    <img src="https://lh3.googleusercontent.com/drive-storage/AKHj6E4r4i9_gsDJzpXFquVKXDA5h1WNUGAx3q3j052cArMoCHau_wxzQJJjZu3Ji4WzHbmzQCSwxF14--KTPg52bEktGoldZ9UzM7FQSAgSIw=w1600-h783" alt="patatas fritas"

    <h2>Ingredientes</h2>
    <dl>
        <dd><li>3 ó 4 patatas (300g.)</li></dd>
        <dd><li>4 dientes de ajo</li></dd>
        <dd><li>Aceite de oliva</li></dd>
        <dd><li>Sal</li></dd>
    </dl>
    <h2>Elaboracion (Pasos)</h2>
    <ol>
        <li>calentar aceite en una sartén.</li>
        <li>Añadir patatas cortadas, la sal y los ajos.</li>
        <li>Freir a gusto.</li>
        <li>servir en el plato.</li>
    </ol>
